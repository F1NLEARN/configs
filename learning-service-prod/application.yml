# ============================================================
# learning-service 프로덕션 환경 (profile: prod)
# ============================================================

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME:learningdb}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.finlearn: INFO
    org.hibernate.SQL: WARN
