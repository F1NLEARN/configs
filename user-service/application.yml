# ============================================================
# user-service 기본 설정
# ============================================================

spring:
  kafka:
    consumer:
      group-id: user-service

  # Redis 기본 설정 (환경별 오버라이드 가능)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  # JPA 배치 쓰기 최적화
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000    # 30분
  refresh-token-expiration: 604800000 # 7일