# ============================================================
# gateway-server 전용 설정
# ============================================================

spring:
  data:
    redis:
      host: ${REDIS_HOST:finlearn-redis}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
  cloud:
    gateway:
      # CORS 전역 설정
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      # 기본 필터
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      # 라우트별 Resilience4j 설정
      server:
        webmvc:
          routes:
          - id: user-service
            uri: lb://user-service
            predicates:
              - Path=/api/v1/users/**
            filters:
              - name: CircuitBreaker
                args:
                  id: userService
                  fallbackUri: forward:/fallback/user-service
          - id: quiz-service
            uri: lb://quiz-service
            predicates:
              - Path=/api/v1/quiz/**
            filters:
              - name: CircuitBreaker
                args:
                  id: quizService
                  fallbackUri: forward:/fallback/quiz-service
          - id: simulation-service
            uri: lb://simulation-service
            predicates:
              - Path=/api/v1/investments/**,/api/v1/holdings/**,/api/v1/trade-histories/**,/api/v1/analyses/**
            filters:
              - name: CircuitBreaker
                args:
                  id: simulationService
                  fallbackUri: forward:/fallback/simulation-service
          - id: season-service
            uri: lb://season-service
            predicates:
              - Path=/api/v1/seasons/**
            filters:
              - name: CircuitBreaker
                args:
                  id: seasonService
                  fallbackUri: forward:/fallback/season-service
          - id: achievement-service
            uri: lb://achievement-service
            predicates:
              - Path=/api/v1/achievements/**
            filters:
              - name: CircuitBreaker
                args:
                  id: achievementService
                  fallbackUri: forward:/fallback/achievement-service
          - id: ranking-service
            uri: lb://ranking-service
            predicates:
              - Path=/api/v1/rankings/**
            filters:
              - name: CircuitBreaker
                args:
                  id: rankingService
                  fallbackUri: forward:/fallback/ranking-service
          - id: learning-service
            uri: lb://learning-service
            predicates:
              - Path=/api/v1/learning/**
            filters:
              - name: CircuitBreaker
                args:
                  id: learningService
                  fallbackUri: forward:/fallback/learning-service

# JWT 검증 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000    # 30분
  refresh-token-expiration: 604800000 # 7일
