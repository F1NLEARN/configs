# ============================================================
# season-service 프로덕션 환경 (profile: prod)
# ============================================================

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME:seasondb}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

logging:
  level:
    com.finlearn: INFO
    org.hibernate.SQL: WARN
