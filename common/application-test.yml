# ============================================================
# 테스트 환경 공통 설정 (profile: test)
# - H2 인메모리 DB
# - Kafka 자동 설정 제외
# ============================================================

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

management:
  tracing:
    sampling:
      probability: 0.0

logging:
  level:
    com.finlearn: DEBUG
    org.hibernate.SQL: DEBUG
