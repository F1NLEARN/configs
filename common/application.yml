# ============================================================
# 모든 서비스 공통 설정 (항상 로드)
# 로컬 환경에서는 application-local.yml 이 이 설정을 오버라이드합니다.
# ============================================================

# ── OpenFeign ──────────────────────────────────────────────
spring:
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: basic
      circuitbreaker:
        enabled: true
      httpclient:
        hc5:
          enabled: true

  # ── Kafka (공통 프로듀서/컨슈머 설정 + SSL) ──────────────
  kafka:
    bootstrap-servers: 34.22.76.220:9092,34.22.66.172:9092,34.158.203.99:9092
    properties:
      security.protocol: SSL
    ssl:
      trust-store-location: classpath:ssl/kafka.server.truststore.jks
      trust-store-password: ${KAFKA_SSL_PASSWORD:_aA123456}
      trust-store-type: JKS
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: 'true'
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
        linger.ms: 5
        batch.size: 16384
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3
      # Dead Letter Topic 지원
      missing-topics-fatal: false

# ── Resilience4j ──────────────────────────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        maxWaitDuration: 10s
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 20
        maxWaitDuration: 500ms
  thread-pool-bulkhead:
    configs:
      default:
        coreThreadPoolSize: 5
        maxThreadPoolSize: 10
        queueCapacity: 50
  timelimiter:
    configs:
      default:
        timeoutDuration: 3s
        cancelRunningFuture: true
  ratelimiter:
    configs:
      default:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 500ms

# ── Actuator & Monitoring ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,refresh
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:zipkin}:9411/api/v2/spans

# ── SpringDoc / Swagger ───────────────────────────────────
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /api-docs.html
    enabled: true

# ── Kafka Topic 명세 (서비스별) ───────────────────────────
kafka:
  topics:
    user:
      registered: finlearn-user-registered
      updated: finlearn-user-updated
      deleted: finlearn-user-deleted
    learning:
      started: finlearn-learning-started
      completed: finlearn-learning-completed
      progress-updated: finlearn-learning-progress-updated
    quiz:
      submitted: finlearn-quiz-submitted
      graded: finlearn-quiz-graded
    simulation:
      started: finlearn-simulation-started
      completed: finlearn-simulation-completed
    achievement:
      earned: finlearn-achievement-earned
      unlocked: finlearn-achievement-unlocked
    ranking:
      updated: finlearn-ranking-updated
    season:
      started: finlearn-season-started
      ended: finlearn-season-ended

# ── 공통 에러 코드 ─────────────────────────────────────────
error:
  configs:
    AccessDeniedException:
      code: C003
      status: 403
      message: "해당 리소스에 대한 접근 권한이 없습니다."
    UnauthorizedException:
      code: C002
      status: 401
      message: "인증되지 않은 사용자입니다."
    InvalidInputException:
      code: C001
      status: 400
      message: "입력값이 유효하지 않습니다."
    EntityNotFoundException:
      code: C004
      status: 404
      message: "해당 정보를 찾을 수 없습니다."
    MethodNotAllowedException:
      code: C005
      status: 405
      message: "지원하지 않는 HTTP 메서드 요청입니다."
    RuntimeException:
      code: C006
      status: 500
      message: "런타임 에러가 발생했습니다."
    GatewayTimeoutException:
      code: C007
      status: 504
      message: "응답 시간이 초과되었습니다."
    DuplicateKeyException:
      code: C008
      status: 409
      message: "이미 존재하는 데이터입니다."
    ServiceUnavailableException:
      code: C009
      status: 503
      message: "서비스를 일시적으로 사용할 수 없습니다."

# ── 로깅 ─────────────────────────────────────────────────
logging:
  level:
    com.finlearn: INFO
    org.springframework.kafka: INFO
    org.apache.kafka: WARN