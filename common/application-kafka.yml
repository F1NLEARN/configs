# ============================================================
# Kafka 공통 설정 (profile: kafka)
# 프로덕션/스테이징 SSL 연결 설정
# 로컬 개발은 application-local.yml 에서 오버라이드
# ============================================================

# SSL Bundle (Spring Boot 3.1+) - classpath nested JAR 문제 우회
spring:
  ssl:
    bundle:
      jks:
        kafka-ssl:
          truststore:
            location: classpath:ssl/kafka.server.truststore.jks
            password: ${KAFKA_SSL_PASSWORD:_aA123456}
            type: JKS

  kafka:
    bootstrap-servers: 34.22.76.220:9092,34.22.66.172:9092,34.158.203.99:9092
    properties:
      security.protocol: SSL
      ssl.endpoint.identification.algorithm: ""
    ssl:
      bundle: kafka-ssl
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: 'true'
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
        linger.ms: 5
        batch.size: 16384
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
      enable-auto-commit: false
      auto-offset-reset: earliest
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3
      missing-topics-fatal: false

logging:
  level:
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
