# ============================================================
# simulation-service 로컬 개발 환경 오버라이드 (profile: local)
# ============================================================

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:simulationdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

stock-master:
  seed:
    enabled: ${STOCK_MASTER_SEED_ENABLED:true}
