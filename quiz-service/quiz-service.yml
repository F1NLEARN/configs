# ============================================================
# quiz-service 기본 설정
# ============================================================

spring:
  kafka:
    consumer:
      group-id: quiz-service

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50

  # AI 모델 활성화 지정
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        project-id: ${GEMINI_PROJECT_ID}
        chat:
          options:
            model: gemini-3.1-flash-lite
        embedding:
          api-key: ${GEMINI_API_KEY}
          project-id: ${GEMINI_PROJECT_ID}
          text:
            options:
              model: gemini-embedding-2
              dimensions: 1536
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        initialize-schema: true

wiki:
  api:
    base-url: https://ko.wikipedia.org/w/api.php
    contact-email: ${WIKI_CONTACT_EMAIL:}
  web-url-prefix: https://ko.wikipedia.org/wiki/
